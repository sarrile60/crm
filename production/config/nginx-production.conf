# ============================================
# PRODUCTION NGINX CONFIGURATION
# 1 LAW SOLICITORS CRM - Fully Secured
# ============================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=general:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=addr:10m;

# Upstream backend
upstream backend_api {
    server 127.0.0.1:8001 fail_timeout=0;
    keepalive 32;
}

# Main server block
server {
    listen 80;
    server_name legal-hub-27.preview.emergentagent.com;
    
    # Security: Hide server version
    server_tokens off;
    
    # Security: Add headers to all responses
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    
    # Connection limits
    limit_conn addr 10;
    
    # Client body size limit
    client_max_body_size 10M;
    client_body_buffer_size 128k;
    
    # Timeouts
    client_body_timeout 12;
    client_header_timeout 12;
    send_timeout 10;
    
    # ==========================================
    # BLOCK SENSITIVE FILES & DIRECTORIES
    # ==========================================
    
    # Block .env files
    location ~ /\.env {
        deny all;
        return 404;
    }
    
    # Block .git directory
    location ~ /\.git {
        deny all;
        return 404;
    }
    
    # Block Python source files
    location ~ \.(py|pyc|pyo|pyd)$ {
        deny all;
        return 404;
    }
    
    # Block backend directory
    location ^~ /backend {
        deny all;
        return 404;
    }
    
    # Block internal directory
    location ^~ /internal {
        deny all;
        return 404;
    }
    
    # Block node_modules
    location ^~ /node_modules {
        deny all;
        return 404;
    }
    
    # Block source maps
    location ~ \.map$ {
        deny all;
        return 404;
    }
    
    # Block config files
    location ~ \.(conf|config|yaml|yml|toml|ini)$ {
        deny all;
        return 404;
    }
    
    # Block log files
    location ~ \.(log|logs)$ {
        deny all;
        return 404;
    }
    
    # Block backup files
    location ~ \.(bak|backup|old|orig|save|swp|swo)$ {
        deny all;
        return 404;
    }
    
    # Block README and documentation in root
    location ~ ^/(README|CHANGELOG|LICENSE|SECURITY) {
        deny all;
        return 404;
    }
    
    # ==========================================
    # API ROUTES - Backend Proxy
    # ==========================================
    
    # Public API endpoints
    location /api/leads/submit {
        limit_req zone=general burst=5 nodelay;
        
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;
        
        # Remove backend identification
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }
    
    # CRM Authentication endpoints (rate limited)
    location ~ ^/api/(crm/auth/login|admin/login) {
        limit_req zone=login burst=3 nodelay;
        
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }
    
    # All other API endpoints
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;
        
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }
    
    # Health check endpoint
    location /health {
        proxy_pass http://backend_api;
        access_log off;
    }
    
    # ==========================================
    # ADMIN PANEL - Production Build
    # ==========================================
    
    location /admin {
        alias /app/production/admin-panel/build;
        try_files $uri $uri/ /admin/index.html;
        
        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        
        # No cache for HTML
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }
    
    # ==========================================
    # PUBLIC FRONTEND - Production Build
    # ==========================================
    
    location / {
        root /app/production/frontend-public/build;
        try_files $uri $uri/ /index.html;
        
        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        
        # No cache for HTML
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }
    
    # ==========================================
    # ERROR PAGES
    # ==========================================
    
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /404.html {
        internal;
        return 404 '{"error": "Resource not found"}';
        add_header Content-Type application/json;
    }
    
    location = /50x.html {
        internal;
        return 500 '{"error": "Internal server error"}';
        add_header Content-Type application/json;
    }
}

